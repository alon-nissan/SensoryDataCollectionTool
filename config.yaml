# Sensory Data Extraction Pipeline — Configuration (v5)

# LLM Settings
llm:
  # Agent models
  agent1_model: "claude-sonnet-4-6"   # Free extraction
  agent2_model: "claude-sonnet-4-6"   # Structuring
  agent3_model: "claude-opus-4-6"     # Figure extraction (vision)
  agent4_model: "claude-sonnet-4-6"   # Validation & correction

  # Shared settings
  max_tokens: 32768
  temperature: 0.0
  max_prompt_chars: 500000  # refuse API call if prompt text exceeds this (~143K tokens)
  max_retries: 3
  retry_delay_seconds: 5

# Prompt Versions (for extraction_runs tracking)
prompt_versions:
  agent1: "v3.0"  # v3.0: added structured panel extraction with demographics/sensory_traits/recruitment
  agent2: "v3.0"  # v3.0: added panels output, panel_label + measurement_domain on observations
  agent3: "v3.0"  # v3.0: added panel_label + measurement_domain to figure observations
  agent4: "v3.0"  # v3.0: added panel contamination and panel FK validation checks

# File Paths
paths:
  data_dir: "data"
  html_dir: "data/html"
  figures_dir: "data/figures"
  extractions_dir: "data/extractions"
  sqlite_db: "data/sensory_data.db"
  prompts_dir: "prompts"
  vocabulary_file: "vocabulary/attribute_map.json"

# Extraction Settings
extraction:
  confidence_threshold: 0.7
  skip_figures: false
  force_reextract: false
  log_file: "extraction.log"
  # Agent 4 validation settings
  spot_check_fraction: 0.2    # Fraction of results to spot-check
  max_targeted_corrections: 10 # Max L2 targeted LLM corrections per paper
  max_spot_check_observations: 5  # Max individual spot-check LLM calls (cost control)

# Table Extraction (PDF)
table_extraction:
  enable_vision_fallback: true       # Use Claude vision for low-confidence tables
  vision_fallback_threshold: 0.4     # pdfplumber confidence below this triggers vision

# Figure Extraction
figures:
  supported_formats: ["png", "jpg", "jpeg", "gif", "svg"]
  convert_svg_to_png: true
  max_image_size_mb: 10
  relevance_threshold: 0.3  # Skip figures scoring below this (0.0 = process all)
