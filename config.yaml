# Sensory Data Extraction Pipeline — Configuration (v4)

# LLM Settings
llm:
  # Agent models
  agent1_model: "claude-sonnet-4-20250514"   # Free extraction
  agent2_model: "claude-sonnet-4-20250514"   # Structuring
  agent3_model: "claude-opus-4-20250514"     # Figure extraction (vision)
  agent4_model: "claude-sonnet-4-20250514"   # Validation & correction

  # Shared settings
  max_tokens: 8192
  temperature: 0.0
  max_retries: 3
  retry_delay_seconds: 5

# Prompt Versions (for extraction_runs tracking)
prompt_versions:
  agent1: "v1.0"
  agent2: "v1.0"
  agent3: "v1.0"
  agent4: "v1.0"

# File Paths
paths:
  data_dir: "data"
  html_dir: "data/html"
  figures_dir: "data/figures"
  extractions_dir: "data/extractions"
  gold_standard_dir: "data/gold_standard"
  sqlite_db: "data/sensory_data.db"
  prompts_dir: "prompts"
  vocabulary_file: "vocabulary/attribute_map.json"

# Publisher → Parser Mapping (for auto-detection from file content)
publishers:
  mdpi:
    parser: "mdpi_parser"
    domains: ["mdpi.com"]
  elsevier:
    parser: "elsevier_parser"
    domains: ["elsevier.com", "sciencedirect.com"]
  springer:
    parser: "springer_parser"
    domains: ["springer.com", "springernature.com", "nature.com"]
  wiley:
    parser: "wiley_parser"
    domains: ["wiley.com", "onlinelibrary.wiley.com"]
  oup:
    parser: "oup_parser"
    domains: ["academic.oup.com", "oup.com"]
  generic:
    parser: "generic_parser"
    domains: []

# Extraction Settings
extraction:
  confidence_threshold: 0.7
  skip_figures: false
  force_reextract: false
  log_file: "extraction.log"
  # Agent 4 validation settings
  spot_check_fraction: 0.2    # Fraction of results to spot-check
  max_targeted_corrections: 10 # Max L2 targeted LLM corrections per paper

# Figure Extraction
figures:
  supported_formats: ["png", "jpg", "jpeg", "gif", "svg"]
  convert_svg_to_png: true
  max_image_size_mb: 10
